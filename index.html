<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Akıllı Akış Medya Oynatıcı</title>
    
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <link href="https://vjs.zencdn.net/8.10.0/video-js-city.css" rel="stylesheet" />

    <style>
        body { 
            margin: 0; 
            background: #0a0a0a; 
            color: #fff; 
            font-family: 'Segoe UI', Arial, sans-serif; 
            padding: 10px; 
        }
        
        /* Mobil Öncelikli Büyük 16:9 Oynatıcı Alanı */
        .player-wrapper { 
            width: 100%; 
            max-width: 1000px; 
            margin: 0 auto; 
        }
        
        .video-container {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* Kesin 16:9 Oranı */
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        
        .video-js, .embed-container {
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100% !important; 
            height: 100% !important;
        }

        .embed-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        #playing-title {
            margin: 10px 0;
            font-size: 16px;
            text-align: center;
            color: #007bff;
        }

        /* Tek Satır Akıllı Kontrol Alanı */
        .controls { 
            max-width: 1000px;
            margin: 10px auto;
            display: flex; 
            gap: 8px; 
        }

        input, button { 
            padding: 14px; 
            font-size: 15px; 
            border-radius: 6px; 
            border: 1px solid #222; 
            background: #161616;
            color: white;
        }
        
        input { flex: 1; }
        
        button { 
            background: #007bff; 
            color: white; 
            font-weight: bold; 
            cursor: pointer;
            border: none;
            padding-left: 25px;
            padding-right: 25px;
        }
        button:hover { background: #0056b3; }

        /* Kanal Listesi Alanı */
        .playlist-wrapper { max-width: 1000px; margin: 15px auto; }
        .channel-list { 
            list-style: none; 
            padding: 0; 
            margin: 10px 0 0 0;
            max-height: 400px;
            overflow-y: auto;
        }
        
        .channel-item { 
            display: flex; 
            align-items: center; 
            padding: 12px; 
            background: #161616; 
            margin-bottom: 6px; 
            border-radius: 6px; 
            cursor: pointer;
            transition: 0.2s;
        }
        .channel-item:hover { background: #222; }
        .channel-item img { width: 35px; height: 35px; margin-right: 12px; border-radius: 4px; object-fit: contain; background: #fff;}
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="player-wrapper">
    <div class="video-container">
        <video id="main-player" class="video-js vjs-default-skin vjs-big-play-centered" controls autoplay preload="auto"></video>
        <div id="embed-container" class="embed-container hidden"></div>
    </div>
    <div id="playing-title">Şu an oynatılan: Hazır</div>
</div>

<div class="controls">
    <input type="text" id="stream-url" placeholder="YouTube, m3u8, Twitch, Kick linki veya YouTube ID yapıştırın...">
    <button onclick="playManualUrl()">Oynat</button>
</div>

<div class="playlist-wrapper">
    <input type="text" id="search" placeholder="Kanal ara..." style="width:100%; box-sizing:border-box;" oninput="filterChannels()">
    <ul id="channel-list" class="channel-list">
        <li style="padding:12px;">Kanallar yükleniyor...</li>
    </ul>
</div>

<script src="https://vjs.zencdn.net/8.10.0/video.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/videojs-youtube/3.0.1/videojs-youtube.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/videojs-dailymotion@1.3.1/dist/videojs-dailymotion.min.js"></script>

<script>
    let player = videojs('main-player', {
        techOrder: ["html5", "youtube", "dailymotion"],
        responsive: true,
        fluid: true
    });

    const playerEl = document.getElementById('main-player');
    const embedContainer = document.getElementById('embed-container');
    const playingTitle = document.getElementById('playing-title');
    let rawChannels = [];

    // YOUTUBE ID AYRIŞTIRICI
    function getYouTubeId(url) {
        if (url.length === 11 && !url.includes('/') && !url.includes('.')) {
            return url;
        }
        const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
        const match = url.match(regExp);
        return (match && match[2].length === 11) ? match[2] : null;
    }

    // M3U PLAYLIST FETCH İŞLEMİ
    fetch("https://iptv-org.github.io/iptv/countries/tr.m3u")
    .then(response => response.text())
    .then(data => parseM3U(data))
    .catch(err => {
        document.getElementById('channel-list').innerHTML = `<li style="color:red; padding:12px;">Liste yüklenemedi!</li>`;
    });

    function parseM3U(data) {
        const lines = data.split('\n');
        let channels = [];
        let currentChannel = {};

        for (let i = 0; i < lines.length; i++) {
            let line = lines[i].trim();
            if (line.startsWith('#EXTINF:')) {
                let logoMatch = line.match(/tvg-logo="([^"]+)"/);
                let logo = logoMatch ? logoMatch[1] : 'https://via.placeholder.com/35?text=TV';
                let name = line.split(',').pop().trim();
                currentChannel = { name: name, logo: logo };
            } else if (line.startsWith('http')) {
                currentChannel.url = line;
                channels.push(currentChannel);
                currentChannel = {};
            }
        }
        rawChannels = channels;
        renderChannels(channels);
    }

    function renderChannels(channels) {
        const listContainer = document.getElementById('channel-list');
        listContainer.innerHTML = '';
        channels.forEach(channel => {
            let li = document.createElement('li');
            li.className = 'channel-item';
            li.innerHTML = `<img src="${channel.logo}" onerror="this.src='https://via.placeholder.com/35?text=TV'"> <span>${channel.name}</span>`;
            li.onclick = () => playMedia(channel.url, channel.name);
            listContainer.appendChild(li);
        });
    }

    function filterChannels() {
        let query = document.getElementById('search').value.toLowerCase();
        let filtered = rawChannels.filter(c => c.name.toLowerCase().includes(query));
        renderChannels(filtered);
    }

    // TAMAMEN OTOMATİK MEDYA MOTORU
    function playMedia(url, title) {
        playingTitle.innerHTML = `Şu an oynatılan: <span style="color:#007bff;">${title}</span>`;
        url = url.trim();

        // Oynatıcıları temizle ve gizle
        player.pause();
        playerEl.classList.add('hidden');
        embedContainer.classList.add('hidden');
        embedContainer.innerHTML = '';

        // 1. YouTube Kontrolü
        let ytId = getYouTubeId(url);
        if (ytId) {
            playerEl.classList.remove('hidden');
            player.src({ type: "video/youtube", src: `https://www.youtube.com/watch?v=${ytId}` });
            player.play().catch(e => {});
            return;
        }

        // 2. Twitch Kontrolü
        if (url.includes('twitch.tv')) {
            embedContainer.classList.remove('hidden');
            let channelName = url.split('/').pop().split('?')[0];
            embedContainer.innerHTML = `<iframe src="https://player.twitch.tv/?channel=${channelName}&parent=${window.location.hostname}" allowfullscreen="true"></iframe>`;
            return;
        }

        // 3. Kick Kontrolü
        if (url.includes('kick.com')) {
            embedContainer.classList.remove('hidden');
            let channelName = url.split('/').pop().split('?')[0];
            embedContainer.innerHTML = `<iframe src="https://player.kick.com/${channelName}" allowfullscreen="true"></iframe>`;
            return;
        }

        // 4. Dailymotion Kontrolü
        if (url.includes('dailymotion.com') || url.includes('dai.ly')) {
            playerEl.classList.remove('hidden');
            player.src({ type: "video/dailymotion", src: url });
            player.play().catch(e => {});
            return;
        }

        // 5. Standart Canlı Yayın veya Medya (.m3u8, .mp4 vb.)
        if (url.includes('.m3u8') || url.includes('.mp4') || url.startsWith('http')) {
            // Güvenlik politikası nedeniyle doğrudan iframe'de açılmaması gereken bilinen siteler hariç normal m3u8 tetiklemesi
            if (!url.includes('.html') && !url.includes('.php')) {
                playerEl.classList.remove('hidden');
                let srcType = url.includes('.mp4') ? "video/mp4" : "application/x-mpegURL";
                player.src({ type: srcType, src: url });
                player.play().catch(e => {});
                return;
            }
        }

        // 6. Geri Kalan Her Şey İçin Genel Web Embed Sistemi
        embedContainer.classList.remove('hidden');
        embedContainer.innerHTML = `<iframe src="${url}" allowfullscreen="true"></iframe>`;
    }

    function playManualUrl() {
        let url = document.getElementById('stream-url').value;
        if(!url) return alert("Lütfen bir link veya ID girin!");
        playMedia(url, "Harici Kaynak");
    }
</script>
</body>
</html>
