<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gelişmiş Çok Amaçlı Medya Oynatıcı</title>
    
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <link href="https://vjs.zencdn.net/8.10.0/video-js-city.css" rel="stylesheet" />

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            display: flex;
            width: 100%;
            max-width: 1200px;
            gap: 20px;
            margin-top: 20px;
        }
        .player-section {
            flex: 2;
            background: #1e1e1e;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .playlist-section {
            flex: 1;
            background: #1e1e1e;
            padding: 15px;
            border-radius: 8px;
            max-height: 600px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .video-container {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* 16:9 Aspect Ratio */
        }
        .video-js, .embed-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100% !important;
            height: 100% !important;
        }
        .embed-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .input-area {
            width: 100%;
            max-width: 1200px;
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        input, select, button {
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #333;
            background-color: #252525;
            color: white;
            font-size: 14px;
        }
        input { flex: 1; }
        button {
            background-color: #007bff;
            cursor: pointer;
            border: none;
            transition: 0.3s;
        }
        button:hover { background-color: #0056b3; }
        .search-box {
            padding: 8px;
            margin-bottom: 10px;
            width: 100%;
            box-sizing: border-box;
        }
        .channel-list {
            overflow-y: auto;
            flex: 1;
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .channel-item {
            padding: 10px;
            border-bottom: 1px solid #333;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
        }
        .channel-item:hover { background-color: #2a2a2a; }
        .channel-item img {
            width: 30px;
            height: 30px;
            object-fit: contain;
            margin-right: 10px;
            border-radius: 4px;
            background: #fff;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <h2>Çok Amaçlı Medya Oynatıcı</h2>

    <div class="input-area">
        <select id="stream-type">
            <option value="auto">Otomatik Oynatıcı (.m3u8, YouTube vb.)</option>
            <option value="twitch">Twitch Kanalı</option>
            <option value="kick">Kick Kanalı</option>
            <option value="iframe">Web Sitesi (Embed/Iframe)</option>
        </select>
        <input type="text" id="stream-url" placeholder="Video, yayın veya m3u8 linki yapıştırın...">
        <button onclick="playManualUrl()">Oynat</button>
    </div>

    <div class="container">
        <div class="player-section">
            <div class="video-container">
                <video id="main-player" class="video-js vjs-default-skin vjs-big-play-centered" controls autoplay preload="auto"></video>
                
                <div id="embed-container" class="embed-container hidden"></div>
            </div>
            <h3 id="playing-title" style="margin-top:15px; color:#007bff;">Oynatılıyor: Hazır</h3>
        </div>

        <div class="playlist-section">
            <h3>TR Canlı TV Listesi</h3>
            <input type="text" id="search-channel" class="search-box" placeholder="Kanal ara..." oninput="filterChannels()">
            <ul id="channel-list" class="channel-list">
                <li style="padding:10px;">Kanallar yükleniyor...</li>
            </ul>
        </div>
    </div>

    <script src="https://vjs.zencdn.net/8.10.0/video.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/videojs-youtube/3.0.1/videojs-youtube.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/videojs-dailymotion@1.3.1/dist/videojs-dailymotion.min.js"></script>

    <script>
        let player = videojs('main-player', {
            techOrder: ["html5", "youtube", "dailymotion"],
            responsive: true,
            fluid: true
        });

        const playerEl = document.getElementById('main-player');
        const embedContainer = document.getElementById('embed-container');
        const playingTitle = document.getElementById('playing-title');
        let rawChannels = []; // M3u'dan gelen temiz liste

        // SAYFA AÇILDIĞINDA M3U FETCH ET
        const m3uUrl = "https://iptv-org.github.io/iptv/countries/tr.m3u";
        
        fetch(m3uUrl)
            .then(response => response.text())
            .then(data => {
                parseM3U(data);
            })
            .catch(err => {
                document.getElementById('channel-list').innerHTML = `<li style="color:red; padding:10px;">Liste yüklenemedi! (CORS engeli veya bağlantı sorunu)</li>`;
                console.error("M3U Fetch hatası:", err);
            });

        // M3U PARSER
        function parseM3U(data) {
            const lines = data.split('\n');
            let channels = [];
            let currentChannel = {};

            for (let i = 0; i < lines.length; i++) {
                let line = lines[i].trim();
                if (line.startsWith('#EXTINF:')) {
                    // Logo çekme
                    let logoMatch = line.match(/tvg-logo="([^"]+)"/);
                    let logo = logoMatch ? logoMatch[1] : 'https://via.placeholder.com/30?text=TV';
                    
                    // İsim çekme
                    let nameParts = line.split(',');
                    let name = nameParts[nameParts.length - 1].trim();
                    
                    currentChannel = { name: name, logo: logo };
                } else if (line.startsWith('http')) {
                    currentChannel.url = line;
                    channels.push(currentChannel);
                    currentChannel = {};
                }
            }
            rawChannels = channels;
            renderChannels(channels);
        }

        // KANALLARI LİSTELE
        function renderChannels(channels) {
            const listContainer = document.getElementById('channel-list');
            listContainer.innerHTML = '';

            if(channels.length === 0) {
                listContainer.innerHTML = '<li style="padding:10px;">Kanal bulunamadı.</li>';
                return;
            }

            channels.forEach(channel => {
                let li = document.createElement('li');
                li.className = 'channel-item';
                li.innerHTML = `<img src="${channel.logo}" onerror="this.src='https://via.placeholder.com/30?text=TV'"> <span>${channel.name}</span>`;
                li.onclick = () => playMedia(channel.url, channel.name, 'auto');
                listContainer.appendChild(li);
            });
        }

        // KANAL FİLTRELEME (ARAMA)
        function filterChannels() {
            let query = document.getElementById('search-channel').value.toLowerCase();
            let filtered = rawChannels.filter(c => c.name.toLowerCase().includes(query));
            renderChannels(filtered);
        }

        // MEDYA OYNATMA MOTORU (TÜM PLATFORMLAR İÇİN)
        function playMedia(url, title, type) {
            playingTitle.innerText = "Oynatılıyor: " + title;
            url = url.trim();

            // Görünürlükleri sıfırla
            player.pause();
            playerEl.classList.add('hidden');
            embedContainer.classList.add('hidden');
            embedContainer.innerHTML = '';

            // TİP TESPİTİ VE OYNATMA
            if (type === 'twitch' || url.includes('twitch.tv')) {
                // Twitch Entegrasyonu
                embedContainer.classList.remove('hidden');
                let channelName = url.split('/').pop().split('?')[0];
                embedContainer.innerHTML = `<iframe src="https://player.twitch.tv/?channel=${channelName}&parent=${window.location.hostname}" allowfullscreen="true" height="100%" width="100%"></iframe>`;
            } 
            else if (type === 'kick' || url.includes('kick.com')) {
                // Kick Entegrasyonu
                embedContainer.classList.remove('hidden');
                let channelName = url.split('/').pop().split('?')[0];
                embedContainer.innerHTML = `<iframe src="https://player.kick.com/${channelName}" allowfullscreen="true" height="100%" width="100%"></iframe>`;
            } 
            else if (type === 'iframe') {
                // Herhangi bir web sitesini gömme
                embedContainer.classList.remove('hidden');
                embedContainer.innerHTML = `<iframe src="${url}" allowfullscreen="true"></iframe>`;
            } 
            else {
                // Video.js (m3u8, mp4, youtube, dailymotion)
                playerEl.classList.remove('hidden');
                
                let srcType = "application/x-mpegURL"; // Varsayılan m3u8
                
                if (url.includes('youtube.com') || url.includes('youtu.be')) {
                    srcType = "video/youtube";
                } else if (url.includes('dailymotion.com') || url.includes('dai.ly')) {
                    srcType = "video/dailymotion";
                } else if (url.endsWith('.mp4')) {
                    srcType = "video/mp4";
                }

                player.src({ type: srcType, src: url });
                player.play().catch(e => console.log("Otomatik oynatma engellendi, oynat'a basın."));
            }
        }

        // MANUEL URL GİRİŞİ TETİKLEYİCİ
        function playManualUrl() {
            let url = document.getElementById('stream-url').value;
            let type = document.getElementById('stream-type').value;
            if(!url) return alert("Lütfen bir URL girin!");
            playMedia(url, "Harici Bağlantı", type);
        }
    </script>
</body>
</html>
