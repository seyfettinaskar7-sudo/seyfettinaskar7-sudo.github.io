<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gelişmiş Çoklu Platform Canlı TV Oynatıcı</title>
    <!-- Video.js CSS -->
    <link href="https://zencdn.net" rel="stylesheet" />
    <style>
        body { margin: 0; padding: 0; background: #111; color: #fff; font-family: sans-serif; display: flex; height: 100vh; overflow: hidden; }
        .container { display: flex; width: 100%; height: 100%; }
        .player-area { flex: 3; background: #000; position: relative; display: flex; flex-direction: column; }
        .m3u-loader { padding: 10px; background: #1a1a1a; display: flex; gap: 10px; border-bottom: 1px solid #333; }
        .m3u-loader input { flex: 1; padding: 8px; background: #222; border: 1px solid #444; color: #fff; border-radius: 4px; }
        .m3u-loader button { padding: 8px 15px; background: #00bcd4; border: none; color: #fff; font-weight: bold; cursor: pointer; border-radius: 4px; }
        .video-container { flex: 1; position: relative; width: 100%; height: 100%; }
        .video-js, iframe { position: absolute; top: 0; left: 0; width: 100% !important; height: 100% !important; border: none; }
        .sidebar { flex: 1; min-width: 300px; max-width: 400px; background: #181818; display: flex; flex-direction: column; border-left: 1px solid #2a2a2a; }
        .sidebar h3 { padding: 15px; margin: 0; background: #202020; border-bottom: 1px solid #333; font-size: 16px; text-transform: uppercase; letter-spacing: 1px; }
        .channel-list { flex: 1; overflow-y: auto; list-style: none; padding: 0; margin: 0; }
        .channel-item { padding: 12px 15px; border-bottom: 1px solid #222; cursor: pointer; transition: background 0.2s; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; justify-content: space-between; align-items: center; }
        .channel-item:hover { background: #252525; }
        .channel-item.active { background: #00bcd4; color: #000; font-weight: bold; }
        .badge { font-size: 10px; padding: 2px 6px; border-radius: 10px; background: #333; color: #ccc; text-transform: uppercase; }
        .active .badge { background: #000; color: #00bcd4; }
    </style>
</head>
<body>

<div class="container">
    <!-- SOL TARAF: OYNATICI VE LINK YÜKLEME ALANI -->
    <div class="player-area">
        <div class="m3u-loader">
            <input type="text" id="m3uUrlInput" placeholder="M3U / M3U8 Liste Linkini Yapıştırın..." value="https://github.io">
            <button onclick="fetchM3UList()">Listeyi Yükle</button>
        </div>
        <div class="video-container" id="videoContainer">
            <!-- Varsayılan olarak Video.js (HLS/.m3u8 için) hazır bekler -->
            <video id="live-player" class="video-js vjs-default-skin vjs-big-play-centered" controls autoplay preload="auto"></video>
        </div>
    </div>

    <!-- SAĞ TARAF: DİNAMİK KANAL LİSTESİ -->
    <div class="sidebar">
        <h3>Canlı Kanallar</h3>
        <ul class="channel-list" id="channelList">
            <!-- Kanallar JavaScript ile buraya eklenecek -->
        </ul>
    </div>
</div>

<!-- Video.js ve HLS (m3u8) Çekirdek Kütüphaneleri -->
<script src="https://zencdn.net"></script>

<script>
    let player;
    
    // Sayfa açıldığında Video.js'i başlat
    document.addEventListener("DOMContentLoaded", function() {
        player = videojs('live-player', {
            fluid: false,
            autoplay: true,
            controls: true
        });
        // İlk açılışta örnek listeyi yükle
        fetchM3UList();
    });

    // M3U Çekme ve Ayrıştırma Fonksiyonu (Fetch M3U)
    async function fetchM3UList() {
        const url = document.getElementById('m3uUrlInput').value.trim();
        if (!url) return alert('Lütfen geçerli bir URL girin.');

        try {
            const response = await fetch(url);
            if (!response.ok) throw new Error('Ağ yanıtı başarısız.');
            const data = await response.text();
            parseM3U(data);
        } catch (error) {
            console.error('Hata:', error);
            alert('M3U listesi yüklenemedi. CORS güvenliği engellemiş olabilir veya link hatalıdır.');
        }
    }

    // M3U Formatını Platformlara Göre Ayrıştıran Algoritma
    function parseM3U(m3uText) {
        const lines = m3uText.split('\n');
        const channels = [];
        let currentName = "";

        for (let i = 0; i < lines.length; i++) {
            let line = lines[i].trim();
            if (line.startsWith('#EXTINF:')) {
                // Kanal adını ayıkla
                const nameMatch = line.match(/,(.+)$/);
                currentName = nameMatch ? nameMatch[1].trim() : "Bilinmeyen Kanal";
            } else if (line && !line.startsWith('#')) {
                // Link satırı
                let streamUrl = line;
                let type = detectPlatform(streamUrl);
                channels.push({ name: currentName || "Kanal " + (channels.length + 1), url: streamUrl, type: type });
                currentName = ""; // Temizle
            }
        }
        renderChannels(channels);
    }

    // Linke bakarak platform türünü tespit eden motor
    function detectPlatform(url) {
        if (url.includes('youtube.com/') || url.includes('youtu.be/')) return 'youtube';
        if (url.includes('twitch.tv/')) return 'twitch';
        if (url.includes('://kick.com')) return 'kick';
        if (url.includes('://dailymotion.com') || url.includes('dai.ly/')) return 'dailymotion';
        if (url.includes('.m3u8')) return 'm3u8';
        return 'web'; // Standart web siteleri / iframe'ler için
    }

    // Kanal listesini sağ menüye basma
    function renderChannels(channels) {
        const listElement = document.getElementById('channelList');
        listElement.innerHTML = "";

        if (channels.length === 0) {
            listElement.innerHTML = '<li class="channel-item">Kanal bulunamadı.</li>';
            return;
        }

        channels.forEach((channel, index) => {
            const li = document.createElement('li');
            li.className = 'channel-item';
            li.innerHTML = `<span>${channel.name}</span> <span class="badge">${channel.type}</span>`;
            li.onclick = () => playChannel(channel, li);
            listElement.appendChild(li);
            
            // İlk kanalı otomatik oynat
            if (index === 0) playChannel(channel, li);
        });
    }

    // Akıllı Oynatıcı Seçim ve Değiştirme Fonksiyonu
    function playChannel(channel, element) {
        // Aktif sınıfını güncelle
        document.querySelectorAll('.channel-item').forEach(el => el.classList.remove('active'));
        element.classList.add('active');

        const container = document.getElementById('videoContainer');
        
        // VideoJS'i her geçişte durdurup gizle/göster yapıyoruz
        player.pause();

        // Platforma göre render stratejisi
        if (channel.type === 'm3u8') {
            // VideoJS'i aktif et, iframe'leri temizle
            container.innerHTML = '<video id="live-player" class="video-js vjs-default-skin vjs-big-play-centered" controls autoplay></video>';
            player = videojs('live-player');
            player.src({ src: channel.url, type: 'application/x-mpegURL' });
            player.play();
        } 
        else if (channel.type === 'youtube') {
            let videoId = extractYoutubeId(channel.url);
            container.innerHTML = `<iframe src="https://youtube.com{videoId}?autoplay=1" allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen></iframe>`;
        } 
        else if (channel.type === 'twitch') {
            let channelName = channel.url.split('twitch.tv/')[1].split('/')[0].split('?')[0];
            let domain = window.location.hostname || "localhost";
            container.innerHTML = `<iframe src="https://twitch.tv{channelName}&parent=${domain}&autoplay=true" allowfullscreen></iframe>`;
        } 
        else if (channel.type === 'kick') {
            let channelName = channel.url.split('://kick.com')[1].split('/')[0].split('?')[0];
            container.innerHTML = `<iframe src="https://player.://kick.com${channelName}" allowfullscreen></iframe>`;
        } 
        else if (channel.type === 'dailymotion') {
            let id = channel.url.split('://dailymotion.comvideo/')[1] || channel.url.split('dai.ly/')[1];
            id = id.split('?')[0];
            container.innerHTML = `<iframe src="https://www.://dailymotion.comembed/video/${id}?autoplay=1" allow="autoplay" allowfullscreen></iframe>`;
        } 
        else {
            // Standart web/iframe linkleri için genel kapsam
            container.innerHTML = `<iframe src="${channel.url}" allowfullscreen></iframe>`;
        }
    }

    // Yardımcı Araç: YouTube Linkinden ID Çıkarma
    function extractYoutubeId(url) {
        const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
        const match = url.match(regExp);
        return (match && match[2].length === 11) ? match[2] : null;
    }
</script>

</body>
</html>
